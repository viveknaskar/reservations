<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>The Continental Reservations</title>
    <link rel="stylesheet" href="/css/site.css"/>
</head>
<body>
<header class="app-header">
    <div class="app-shell header-content">
        <a class="brand" href="/reservations" aria-label="The Continental reservations home">
            <span class="brand-mark" aria-hidden="true">TC</span>
            <span>The Continental Reservations</span>
        </a>
        <div class="header-actions">
            <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false">
                <span class="theme-icon" aria-hidden="true">☾</span>
                <span class="theme-label">Dark</span>
            </button>
            <form class="date-form" method="get" action="/reservations">
                <label for="reservation-date">Date</label>
                <div class="date-control">
                    <input
                        type="date"
                        id="reservation-date"
                        name="date"
                        th:value="${param.date != null ? param.date[0] : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                    />
                    <button type="submit">View</button>
                </div>
            </form>
        </div>
    </div>
</header>

<main class="app-shell page">
    <section class="booking-workspace" aria-label="Book a stay">
        <div class="availability-panel">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Availability</p>
                    <h1>Book a stay</h1>
                </div>
                <p class="section-meta" id="availability-count">0 rooms</p>
            </div>

            <form class="booking-search" id="availability-form">
                <label>
                    <span>Check-in</span>
                    <input type="date" id="check-in" name="checkIn" required/>
                </label>
                <label>
                    <span>Check-out</span>
                    <input type="date" id="check-out" name="checkOut" required/>
                </label>
                <label>
                    <span>Guests</span>
                    <input type="number" id="min-capacity" name="minCapacity" min="1" max="8" value="1" required/>
                </label>
                <button type="submit">Search</button>
            </form>

            <div class="room-results" id="available-rooms" aria-live="polite">
                <p class="empty-state">Search dates to see available rooms.</p>
            </div>
        </div>

        <aside class="booking-panel" aria-label="Create reservation">
            <div>
                <p class="eyebrow">Booking</p>
                <h2>Reservation</h2>
            </div>
            <div class="selected-room" id="selected-room">
                <p class="empty-state">Select an available room.</p>
            </div>
            <form class="reservation-form" id="reservation-form">
                <input type="hidden" id="room-id" name="roomId"/>
                <label>
                    <span>Guest ID</span>
                    <input type="number" id="guest-id" name="guestId" min="1" required/>
                </label>
                <label>
                    <span>Guest count</span>
                    <input type="number" id="guest-count" name="guestCount" min="1" value="1" required/>
                </label>
                <button type="submit" id="book-button" disabled>Book room</button>
            </form>
            <div class="form-alert" id="booking-alert" role="status" aria-live="polite"></div>
        </aside>
    </section>

    <section class="summary-strip" aria-label="Reservation summary">
        <div>
            <p class="eyebrow">Occupancy</p>
            <h1>Room Reservations</h1>
        </div>
        <div class="metrics">
            <div>
                <span th:text="${#lists.size(roomReservations)}">0</span>
                <p>Rooms</p>
            </div>
            <div>
                <span th:text="${#lists.size(roomReservations.?[lastName != null])}">0</span>
                <p>Booked</p>
            </div>
            <div>
                <span th:text="${#lists.size(roomReservations.?[lastName == null])}">0</span>
                <p>Vacant</p>
            </div>
        </div>
    </section>

    <section class="table-panel" aria-label="Room reservation list">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th scope="col">Room</th>
                    <th scope="col">Number</th>
                    <th scope="col">Guest</th>
                    <th scope="col">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="roomReservation: ${roomReservations}">
                    <td>
                        <span class="room-name" th:text="${roomReservation.roomName}">Room Name</span>
                    </td>
                    <td>
                        <span class="room-number" th:text="${roomReservation.roomNumber}">C2</span>
                    </td>
                    <td th:text="${roomReservation.lastName} != null ? ${roomReservation.lastName} + ', ' + ${roomReservation.firstName} : 'Vacant'">Vacant</td>
                    <td>
                        <span
                            th:class="${roomReservation.lastName} != null ? 'status status-booked' : 'status status-vacant'"
                            th:text="${roomReservation.lastName} != null ? 'Booked' : 'Vacant'">Vacant</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<footer class="app-footer">
    <div class="app-shell">
        <p>The Continental</p>
    </div>
</footer>

<script src="/js/site.js"></script>
</body>
</html>
